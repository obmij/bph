name: Install verified redesigned BPH website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bph-production-install
  cancel-in-progress: false

jobs:
  install-test-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble approved stylesheet
        run: |
          mkdir -p assets/css assets/js assets/images
          cat .payload/site.css.001 .payload/site.css.002 .payload/site.css.003 .payload/site.css.004 > assets/css/site.css

      - name: Restore approved original photographs
        run: |
          python -m pip install --disable-pip-version-check Pillow
          python - <<'PY'
          from io import BytesIO
          from pathlib import Path
          from urllib.parse import quote
          from urllib.request import urlopen, Request
          from PIL import Image

          commit = 'c1e9f36050040c261d9855da3873af701e176f9f'
          repository = 'obmij/bph'
          output = Path('assets/images')
          output.mkdir(parents=True, exist_ok=True)

          images = {
              'amenities.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/備品販售-2880w.JPG', (1800, 1350)),
              'attraction-dadaocheng.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/大稻埕碼頭-2880w.jpg', (1024, 683)),
              'attraction-guanghua.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/光華商場-2880w.jpg', (450, 339)),
              'attraction-huashan.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/華山1914文化創意產業園區-2880w.jpg', (1800, 1200)),
              'attraction-longshan.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/龍山寺-2880w.jpg', (1800, 1350)),
              'attraction-ningxia.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/寧夏夜市-2880w.jpg', (1024, 683)),
              'attraction-raohe.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/饒河夜市-2880w.jpg', (1024, 683)),
              'attraction-shilin.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/士林夜市-2880w.jpg', (1024, 683)),
              'attraction-ximen.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/西門町-2880w.jpg', (480, 360)),
              'changchun-corridor.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_4794.JPG', (1222, 791)),
              'changchun-detail.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_4796.JPG', (1200, 791)),
              'changchun-hall.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_4815.JPG', (1186, 791)),
              'changchun-room-alt.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_4886.JPG', (1122, 791)),
              'changchun-room.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_4854.JPG', (550, 791)),
              'changchun-safe.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/IMG_4878-1920w.JPG', (1186, 791)),
              'hero.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/IMG_4767-1920w.JPG', (1209, 791)),
              'ximen-bathroom.webp': ('lirp.cdn-website.com/0237265e/dms3rep/multi/opt/_MG_0029-1920w.JPG', (1800, 1200)),
              'ximen-exterior.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_5605.JPG', (1800, 1200)),
              'ximen-lobby.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_5647.JPG', (1800, 1200)),
              'ximen-lounge.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/交誼廳-3-24175383.JPG', (1800, 1200)),
              'ximen-room.webp': ('irp.cdn-website.com/0237265e/dms3rep/multi/IMG_5668.JPG', (933, 1400)),
          }
          logo_source = 'irp.cdn-website.com/0237265e/dms3rep/multi/背包棧旅店logo+(1)-01.png'

          def download(path: str) -> bytes:
              url = f'https://raw.githubusercontent.com/{repository}/{commit}/{quote(path, safe="/")}'
              request = Request(url, headers={'User-Agent': 'BPH-production-builder'})
              with urlopen(request, timeout=90) as response:
                  data = response.read()
              if not data:
                  raise RuntimeError(f'empty download: {path}')
              return data

          for name, (source, size) in images.items():
              image = Image.open(BytesIO(download(source))).convert('RGB')
              if image.size != size:
                  image = image.resize(size, Image.Resampling.LANCZOS)
              image.save(output / name, 'WEBP', quality=82, method=4)

          logo_bytes = download(logo_source)
          (output / 'logo.png').write_bytes(logo_bytes)
          logo = Image.open(BytesIO(logo_bytes)).convert('RGBA').resize((260, 50), Image.Resampling.LANCZOS)
          logo.save(output / 'logo.webp', 'WEBP', quality=82, method=4)
          PY

      - name: Install permanent validation and deployment workflow
        shell: bash
        run: |
          cat > .github/workflows/deploy-pages.yml <<'YAML'
          name: Validate and deploy redesigned BPH website

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            validate:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '22'
                - name: Validate files, links, images and JavaScript
                  run: |
                    python -m pip install --disable-pip-version-check Pillow
                    python - <<'PY'
                    from html.parser import HTMLParser
                    from pathlib import Path
                    from urllib.parse import unquote, urlsplit
                    from PIL import Image
                    import sys

                    root = Path.cwd()
                    pages = ['index.html','ximen.html','changchun.html','travel.html','booking.html','contact.html']
                    required = pages + ['assets/css/site.css','assets/js/site.js','.nojekyll']
                    errors = []

                    class Parser(HTMLParser):
                        def __init__(self):
                            super().__init__(convert_charrefs=True)
                            self.refs=[]; self.title=False; self.viewport=False
                        def handle_starttag(self, tag, attrs):
                            values=dict(attrs)
                            if tag=='title': self.title=True
                            if tag=='meta' and (values.get('name') or '').lower()=='viewport': self.viewport=True
                            for key in ('href','src'):
                                if values.get(key): self.refs.append((key,values[key]))

                    for name in required:
                        path=root/name
                        if not path.exists(): errors.append(f'missing: {name}')
                        elif path.is_file() and path.stat().st_size==0 and name!='.nojekyll': errors.append(f'empty: {name}')

                    for name in pages:
                        path=root/name
                        if not path.exists(): continue
                        parser=Parser(); parser.feed(path.read_text(encoding='utf-8'))
                        if not parser.title: errors.append(f'{name}: missing title')
                        if not parser.viewport: errors.append(f'{name}: missing viewport')
                        for kind,value in parser.refs:
                            if value.startswith(('#','http:','https:','mailto:','tel:','data:','javascript:')): continue
                            local=unquote(urlsplit(value).path)
                            target=(path.parent/local)
                            if target.is_dir(): target=target/'index.html'
                            if not target.exists(): errors.append(f'{name}: broken {kind} {value}')

                    images=sorted((root/'assets/images').glob('*'))
                    if len(images)!=23: errors.append(f'expected 23 images, found {len(images)}')
                    for image_path in images:
                        try:
                            with Image.open(image_path) as image: image.verify()
                        except Exception as exc: errors.append(f'{image_path}: invalid image: {exc}')

                    forbidden=['www.bph.com.tw','dd-cdn.multiscreensite.com','dp-cdn.multiscreensite.com','irp.cdn-website.com','irt-cdn.multiscreensite.com','lirp.cdn-website.com','s3.amazonaws.com','static-cdn.dwhitelabel.com','static.cdn-website.com','www.googletagmanager.com','.payload']
                    for name in forbidden:
                        if (root/name).exists(): errors.append(f'legacy or temporary path exists: {name}')

                    if errors:
                        print('\n'.join(f'- {error}' for error in errors), file=sys.stderr)
                        raise SystemExit(1)
                    print('Static validation passed.')
                    PY
                    node --check assets/js/site.js

            deploy:
              needs: validate
              runs-on: ubuntu-latest
              environment:
                name: github-pages
              steps:
                - uses: actions/checkout@v4
                - uses: actions/configure-pages@v5
                - uses: actions/upload-pages-artifact@v3
                  with:
                    path: .
                - id: deployment
                  uses: actions/deploy-pages@v4
          YAML

      - name: Remove temporary installer payload
        run: |
          rm -rf .payload
          rm -f .github/workflows/install-production-site.yml
          touch .nojekyll

      - name: Validate production files and original images
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import unquote, urlsplit
          from PIL import Image
          import sys

          root=Path.cwd()
          pages=['index.html','ximen.html','changchun.html','travel.html','booking.html','contact.html']
          expected_images={
            'amenities.webp':(1800,1350),'attraction-dadaocheng.webp':(1024,683),'attraction-guanghua.webp':(450,339),
            'attraction-huashan.webp':(1800,1200),'attraction-longshan.webp':(1800,1350),'attraction-ningxia.webp':(1024,683),
            'attraction-raohe.webp':(1024,683),'attraction-shilin.webp':(1024,683),'attraction-ximen.webp':(480,360),
            'changchun-corridor.webp':(1222,791),'changchun-detail.webp':(1200,791),'changchun-hall.webp':(1186,791),
            'changchun-room-alt.webp':(1122,791),'changchun-room.webp':(550,791),'changchun-safe.webp':(1186,791),
            'hero.webp':(1209,791),'logo.png':(1920,366),'logo.webp':(260,50),'ximen-bathroom.webp':(1800,1200),
            'ximen-exterior.webp':(1800,1200),'ximen-lobby.webp':(1800,1200),'ximen-lounge.webp':(1800,1200),
            'ximen-room.webp':(933,1400)
          }
          errors=[]
          class Parser(HTMLParser):
            def __init__(self): super().__init__(convert_charrefs=True); self.refs=[]; self.title=False; self.viewport=False
            def handle_starttag(self,tag,attrs):
              values=dict(attrs)
              if tag=='title': self.title=True
              if tag=='meta' and (values.get('name') or '').lower()=='viewport': self.viewport=True
              for key in ('href','src'):
                if values.get(key): self.refs.append((key,values[key]))
          for name in pages:
            path=root/name
            if not path.exists(): errors.append(f'missing page: {name}'); continue
            parser=Parser(); parser.feed(path.read_text(encoding='utf-8'))
            if not parser.title: errors.append(f'{name}: missing title')
            if not parser.viewport: errors.append(f'{name}: missing viewport')
            for kind,value in parser.refs:
              if value.startswith(('#','http:','https:','mailto:','tel:','data:','javascript:')): continue
              local=unquote(urlsplit(value).path); target=path.parent/local
              if not target.exists(): errors.append(f'{name}: broken {kind} {value}')
          for name,size in expected_images.items():
            path=root/'assets/images'/name
            if not path.exists(): errors.append(f'missing image: {name}'); continue
            try:
              with Image.open(path) as image:
                if image.size!=size: errors.append(f'{name}: expected {size}, got {image.size}')
                image.verify()
            except Exception as exc: errors.append(f'{name}: invalid image: {exc}')
          if (root/'www.bph.com.tw').exists(): errors.append('legacy site directory exists')
          if errors:
            print('\n'.join(f'- {error}' for error in errors),file=sys.stderr); raise SystemExit(1)
          print('Production validation passed: 6 pages and 23 images.')
          PY
          node --check assets/js/site.js

      - name: Browser smoke test
        run: |
          python -m http.server 8000 >/tmp/bph-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 2
          for page in index.html ximen.html changchun.html travel.html booking.html contact.html; do
            curl --fail --silent --show-error "http://127.0.0.1:8000/$page" >/dev/null
          done
          chrome="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [ -n "$chrome" ]; then
            "$chrome" --headless=new --no-sandbox --disable-gpu --virtual-time-budget=4000 --dump-dom http://127.0.0.1:8000/index.html > /tmp/index-dom.html
            "$chrome" --headless=new --no-sandbox --disable-gpu --virtual-time-budget=4000 --dump-dom http://127.0.0.1:8000/contact.html > /tmp/contact-dom.html
            "$chrome" --headless=new --no-sandbox --disable-gpu --virtual-time-budget=4000 --dump-dom http://127.0.0.1:8000/booking.html > /tmp/booking-dom.html
            grep -q 'data-quick-services' /tmp/index-dom.html
            grep -q 'data-contact-actions="ximen"' /tmp/contact-dom.html
            grep -q 'data-map-action="directions"' /tmp/contact-dom.html
            if grep -q 'Booking system integration required' /tmp/booking-dom.html; then
              echo 'Old booking alert remains active' >&2
              exit 1
            fi
          fi

      - name: Commit verified production website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy verified redesigned BPH website with original images"
          git push origin HEAD:main
          git push --force origin HEAD:gh-pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified website
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified website
        id: deployment
        uses: actions/deploy-pages@v4
