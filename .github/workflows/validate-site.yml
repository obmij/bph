name: Validate BPH Site

on:
  pull_request:
    paths:
      - "site/**"
      - "scripts/validate_site.py"
      - ".github/workflows/validate-site.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/validate_site.py"
      - ".github/workflows/validate-site.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate HTML, links and cached assets
        run: python scripts/validate_site.py
