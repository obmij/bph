name: Restore original BPH content to root

on:
  push:
    branches: [main]
    paths:
      - "www.bph.com.tw/**"
      - "scripts/restore_original.py"
      - ".github/workflows/restore-original.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore original pages and assets at root
        run: python scripts/restore_original.py

      - name: Commit restored website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Restore original BPH text and images at repository root"
          git push origin HEAD:main
